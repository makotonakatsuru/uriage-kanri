<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" type="image/png" href="icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="売上・経費管理">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>売上・経費管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:#f5f5f5;color:#222}
:root{--g:#1D9E75;--gl:#E1F5EE;--gd:#085041;--r:#E24B4A;--rl:#FCEBEB;--rd:#A32D2D;--b:#378ADD;--bl:#E6F1FB;--border:#e0e0e0;--bg:#fff;--bg2:#f7f7f7}
.wrap{max-width:480px;margin:0 auto;background:#fff;min-height:100vh}
.topbar{background:var(--g);padding:6px 16px 16px;position:sticky;top:0;z-index:100}
.sumrow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 14px;border-bottom:1px solid var(--border)}
.sc{background:var(--bg2);border-radius:10px;padding:10px 12px}
.sc .sl{font-size:11px;color:#888;margin-bottom:3px}
.sc .sv{font-size:17px;font-weight:600}
.sv.i{color:var(--g)}.sv.e{color:var(--r)}.sv.b{color:var(--b)}
.panel{padding:14px 16px;border-bottom:1px solid var(--border)}
.form{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.formrow{display:flex;gap:10px;align-items:center}
.tt{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;flex-shrink:0}
.tt button{padding:7px 18px;font-size:13px;border:none;background:none;cursor:pointer;color:#888;font-family:inherit}
.tt button.ai{background:var(--gl);color:var(--gd);font-weight:600}
.tt button.ae{background:var(--rl);color:var(--rd);font-weight:600}
select,input[type=number]{font-size:18px;padding:12px 14px;border:1px solid var(--border);border-radius:8px;background:#fff;color:#222;flex:1;font-family:inherit}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
.ab{padding:12px 22px;font-size:18px;border:none;border-radius:8px;background:var(--g);color:#fff;cursor:pointer;font-weight:600;white-space:nowrap;font-family:inherit}
.ab:disabled{opacity:.5}
.date-hint{font-size:12px;color:#888;margin-bottom:6px}
.date-hint span{color:var(--g);font-weight:600}
.er{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--bg2);border-radius:8px;margin-bottom:6px}
.ec{flex:1;font-size:13px;color:#888}
.ea{font-size:14px;font-weight:600;min-width:80px;text-align:right}
.ea.i{color:var(--g)}.ea.e{color:var(--r)}
.db{background:none;border:none;cursor:pointer;font-size:18px;color:#bbb;padding:0 4px;line-height:1}
.db:hover{color:var(--r)}
.em{font-size:13px;color:#aaa;text-align:center;padding:10px 0}
.cal{padding:12px 14px;border-bottom:1px solid var(--border)}
.dows{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:5px}
.dow{font-size:12px;font-weight:500;text-align:center;color:#888;padding:4px 0}
.dow:first-child{color:var(--r)}.dow:last-child{color:var(--b)}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cell{border-radius:10px;padding:6px 3px;min-height:64px;background:var(--bg2);border:2px solid transparent;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;transition:border-color .15s}
.cell:hover{border-color:#ccc}.cell:active{opacity:.7}
.cell.other{opacity:.2;pointer-events:none}
.cell.today{border-color:var(--b);background:var(--bl)}
.cell.sel{border-color:var(--g)}
.cn{font-size:13px;font-weight:500;color:#666;line-height:1}
.cn.sun{color:var(--r)}.cn.sat{color:var(--b)}.cn.tod{color:var(--b);font-weight:700}
.chart-section{padding:16px 16px 20px;border-bottom:1px solid var(--border)}
.chart-section-title{font-size:14px;font-weight:600;margin-bottom:14px;color:#444}
.chart-box{background:var(--bg2);border-radius:12px;padding:12px 10px}
.chart-canvas-wrap{display:flex;justify-content:center;margin-bottom:10px}
.legend{display:flex;flex-direction:column;gap:5px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px}
.leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.leg-label{flex:1;color:#555;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.leg-pct{font-size:10px;color:#aaa;min-width:28px;text-align:right}
.leg-amt{font-size:10px;color:#333;font-weight:600;padding-left:14px;margin-top:-3px;margin-bottom:2px}
.no-data{font-size:12px;color:#bbb;text-align:center;padding:16px 0}
.annual-section{padding:16px 14px 24px}
.annual-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.annual-title{font-size:14px;font-weight:600;color:#444}
.annual-year{font-size:13px;color:#888}
.annual-table{width:100%;border-collapse:collapse;font-size:12px}
.annual-table th{padding:7px 6px;text-align:right;color:#888;font-weight:500;border-bottom:2px solid var(--border);white-space:nowrap}
.annual-table th:first-child{text-align:left}
.annual-table td{padding:7px 6px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap}
.annual-table td:first-child{text-align:left;font-weight:500;color:#555}
.annual-table tr.future td{color:#ccc}
.annual-table tr.current-month td{background:#f0faf5}
.annual-table tr.current-month td:first-child{color:var(--g);font-weight:700}
.annual-table tr.total-row td{font-weight:700;border-top:2px solid var(--border);border-bottom:none;background:var(--bg2)}
.inc-val{color:var(--g)}.exp-val{color:var(--r)}.warn-val{color:#EF9F27;font-weight:600}
.bal-pos{color:var(--b);font-weight:600}.bal-neg{color:var(--r);font-weight:600}
.foot{font-size:11px;color:#aaa;text-align:center;padding:12px 16px;border-top:1px solid var(--border)}
.settings-btn{background:rgba(0,0,0,0.35);border:2px solid rgba(255,255,255,0.8);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.4)}
.settings-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:999}
.settings-overlay.show{display:block}
.settings-menu{position:absolute;top:56px;right:12px;background:#fff;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.15);overflow:hidden;min-width:200px}
.settings-item{display:flex;align-items:center;gap:10px;padding:13px 16px;font-size:14px;color:#333;cursor:pointer;border-bottom:1px solid var(--border)}
.settings-item:last-child{border-bottom:none}
.settings-item:hover{background:var(--bg2)}
.settings-item.danger{color:var(--r)}
.settings-icon{font-size:16px;width:20px;text-align:center}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;width:100%;max-width:480px;max-height:75vh;display:flex;flex-direction:column;margin-bottom:20px}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 12px;border-bottom:1px solid var(--border)}
.modal-title{font-size:16px;font-weight:600;color:#222}
.modal-close{background:none;border:none;font-size:22px;color:#aaa;cursor:pointer;padding:0 4px;line-height:1}
.modal-body{overflow-y:auto;padding:12px 16px;flex:1}
.modal-item{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border)}
.modal-item:last-child{border-bottom:none}
.modal-amt{font-size:14px;font-weight:600}
.modal-total{padding:12px 16px;border-top:2px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-total-label{font-size:13px;color:#888}
.modal-total-val{font-size:16px;font-weight:700}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
      <div style="font-size:18px;font-weight:600;color:#fff">⚡ 売上・経費管理</div>
      <button class="settings-btn" onclick="toggleSettings()">⚙️</button>
    </div>
    <div style="display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:24px">
      <button id="prev-year" style="border:none;background:none;cursor:pointer;font-size:10px;color:rgba(255,255,255,0.45);padding:0 2px">◀</button>
      <span id="ylbl" style="font-size:16px;color:#fff;font-weight:700"></span>
      <button id="next-year" style="border:none;background:none;cursor:pointer;font-size:10px;color:rgba(255,255,255,0.45);padding:0 2px">▶</button>
    </div>
    <div style="display:flex;justify-content:center;align-items:center;gap:4px">
      <button id="prev" style="border:none;background:none;cursor:pointer;font-size:13px;color:rgba(255,255,255,0.5);padding:0 4px">‹</button>
      <span id="mlbl" style="font-size:32px;font-weight:700;color:#fff;min-width:80px;text-align:center;line-height:1"></span>
      <button id="next" style="border:none;background:none;cursor:pointer;font-size:13px;color:rgba(255,255,255,0.5);padding:0 4px">›</button>
    </div>
  </div>

  <div class="settings-overlay" id="settings-overlay" onclick="closeSettings()">
    <div class="settings-menu" onclick="event.stopPropagation()">
      <div class="settings-item" onclick="openBudgetModal();closeSettings()"><span class="settings-icon">🎯</span>月間目標の設定</div>
      <div class="settings-item" onclick="exportCSV();closeSettings()"><span class="settings-icon">📤</span>CSVエクスポート</div>
      <div class="settings-item" onclick="document.getElementById('import-file').click();closeSettings()"><span class="settings-icon">📥</span>CSVインポート</div>
      <input type="file" id="import-file" accept=".csv" style="display:none" onchange="importCSV(event)">
      <div class="settings-item danger" onclick="resetData();closeSettings()"><span class="settings-icon">🗑️</span>データをリセット</div>
    </div>
  </div>

  <div class="sumrow">
    <div class="sc"><div class="sl">売上</div><div class="sv i" id="si">¥0</div></div>
    <div class="sc"><div class="sl">経費</div><div class="sv e" id="se">¥0</div></div>
    <div class="sc"><div class="sl">利益</div><div class="sv b" id="sb">¥0</div></div>
  </div>

  <div class="panel">
    <div class="date-hint" id="date-hint">↓ カレンダーで日付を選んでください</div>
    <div class="form">
      <div class="formrow">
        <div class="tt">
          <button id="ib" class="ai" onclick="setType('inc')">売上</button>
          <button id="eb" onclick="setType('exp')">経費</button>
        </div>
        <select id="cs" style="display:none"></select>
      </div>
      <div class="formrow">
        <input type="number" id="ai" placeholder="金額を入力（例: 150000）" min="1">
        <button class="ab" id="ab" onclick="addE()">追加</button>
      </div>
      <div class="formrow">
        <input type="text" id="note" list="note-history" placeholder="取引先名（例：〇〇電設）" style="font-size:18px;padding:12px 14px;border:1px solid var(--border);border-radius:8px;background:#fff;color:#222;width:100%;font-family:inherit">
        <datalist id="note-history"></datalist>
      </div>
    </div>
    <div id="elist"></div>
  </div>

  <div class="cal">
    <div class="dows">
      <div class="dow">日</div><div class="dow">月</div><div class="dow">火</div>
      <div class="dow">水</div><div class="dow">木</div><div class="dow">金</div><div class="dow">土</div>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="chart-section">
    <div class="chart-section-title">経費 カテゴリ別内訳</div>
    <div class="chart-box">
      <div class="chart-canvas-wrap"><canvas id="pie-exp" width="110" height="110"></canvas></div>
      <div class="legend" id="legend-exp"></div>
    </div>
  </div>

  <div class="chart-section" id="budget-section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="chart-section-title" style="margin:0">月間目標（経費上限）</div>
      <button onclick="openBudgetModal()" style="font-size:12px;padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer">設定</button>
    </div>
    <div id="budget-bars"></div>
  </div>

  <div class="chart-section">
    <div class="chart-section-title">月別推移</div>
    <canvas id="trend-chart" height="160" style="width:100%"></canvas>
  </div>

  <div class="annual-section">
    <div class="annual-header">
      <div class="annual-title">年間収支</div>
      <div class="annual-year" id="annual-year"></div>
    </div>
    <table class="annual-table">
      <thead><tr><th>月</th><th>売上</th><th>経費</th><th>経費率</th><th>利益</th></tr></thead>
      <tbody id="annual-body"></tbody>
    </table>
  </div>
  <div class="foot">売上・経費管理</div>
</div>

<!-- 日付モーダル -->
<div class="modal-overlay" id="day-modal" onclick="closeDayModal(event)">
  <div class="modal">
    <div class="modal-header"><div class="modal-title" id="day-modal-title"></div><button class="modal-close" onclick="document.getElementById('day-modal').classList.remove('show')">✕</button></div>
    <div class="modal-body" id="day-modal-body"></div>
    <div class="modal-total"><span class="modal-total-label">収支</span><span class="modal-total-val" id="day-modal-total"></span></div>
  </div>
</div>

<!-- 目標設定モーダル -->
<div class="modal-overlay" id="budget-modal" onclick="closeBudgetModal(event)">
  <div class="modal">
    <div class="modal-header"><div class="modal-title">月間目標の設定</div><button class="modal-close" onclick="document.getElementById('budget-modal').classList.remove('show')">✕</button></div>
    <div class="modal-body" style="padding:16px"><div id="budget-inputs"></div><button onclick="saveBudget()" style="width:100%;padding:12px;background:var(--g);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;margin-top:8px">保存</button></div>
  </div>
</div>

<!-- 追加モーダル -->
<div class="modal-overlay" id="add-modal" onclick="closeAddModal(event)">
  <div class="modal">
    <div class="modal-header"><div class="modal-title" id="add-modal-title">記録を追加</div><button class="modal-close" onclick="document.getElementById('add-modal').classList.remove('show')">✕</button></div>
    <div class="modal-body" style="padding:16px">
      <div style="margin-bottom:12px"><div style="display:flex;gap:8px">
        <button id="ib2" onclick="setType2('inc')" style="flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-size:14px;background:var(--g);color:#fff">売上</button>
        <button id="eb2" onclick="setType2('exp')" style="flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-size:14px">経費</button>
      </div></div>
      <div id="cs2-wrap" style="margin-bottom:12px;display:none"><select id="cs2" style="width:100%;font-size:16px;padding:10px;border:1px solid var(--border);border-radius:8px"></select></div>
      <div style="margin-bottom:12px"><input type="number" id="ai2" placeholder="金額を入力" min="1" style="width:100%;font-size:16px;padding:10px;border:1px solid var(--border);border-radius:8px;box-sizing:border-box"></div>
      <div style="margin-bottom:16px"><input type="text" id="note2" list="note-history" placeholder="取引先名（例：〇〇電設）" style="width:100%;font-size:16px;padding:10px;border:1px solid var(--border);border-radius:8px;box-sizing:border-box"></div>
      <button onclick="addE2()" id="ab2" style="width:100%;padding:12px;background:var(--g);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer">追加</button>
    </div>
  </div>
</div>

<!-- 編集モーダル -->
<div class="modal-overlay" id="edit-modal" onclick="closeEditModal(event)">
  <div class="modal">
    <div class="modal-header"><div class="modal-title">記録を編集</div><button class="modal-close" onclick="document.getElementById('edit-modal').classList.remove('show')">✕</button></div>
    <div class="modal-body" style="padding:16px">
      <div style="margin-bottom:12px"><div style="font-size:12px;color:#888;margin-bottom:4px">種別</div>
        <div style="display:flex;gap:8px">
          <button id="edit-inc-btn" onclick="setEditType('inc')" style="flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-size:14px">売上</button>
          <button id="edit-exp-btn" onclick="setEditType('exp')" style="flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-size:14px">経費</button>
        </div>
      </div>
      <div id="edit-cat-wrap" style="margin-bottom:12px;display:none"><div style="font-size:12px;color:#888;margin-bottom:4px">カテゴリ</div><select id="edit-category" style="width:100%;font-size:16px;padding:10px;border:1px solid var(--border);border-radius:8px"></select></div>
      <div style="margin-bottom:12px"><div style="font-size:12px;color:#888;margin-bottom:4px">金額</div><input type="number" id="edit-amount" style="width:100%;font-size:16px;padding:10px;border:1px solid var(--border);border-radius:8px;box-sizing:border-box"></div>
      <div style="margin-bottom:12px"><div style="font-size:12px;color:#888;margin-bottom:4px" id="edit-note-label">取引先名</div><input type="text" id="edit-note" list="note-history" style="width:100%;font-size:16px;padding:10px;border:1px solid var(--border);border-radius:8px;box-sizing:border-box"></div>
      <div style="margin-bottom:16px"><div style="font-size:12px;color:#888;margin-bottom:4px">日付</div><input type="date" id="edit-date" style="width:100%;font-size:16px;padding:10px;border:1px solid var(--border);border-radius:8px;box-sizing:border-box"></div>
      <button onclick="saveEdit()" style="width:100%;padding:12px;background:var(--g);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer">保存</button>
    </div>
  </div>
</div>

<!-- カテゴリ詳細モーダル -->
<div class="modal-overlay" id="cat-modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header"><div class="modal-title" id="modal-title"></div><button class="modal-close" onclick="document.getElementById('cat-modal').classList.remove('show')">✕</button></div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-total"><span class="modal-total-label">合計</span><span class="modal-total-val" id="modal-total"></span></div>
  </div>
</div>

<script>
const EXP=['仕入','外注費','材料費','交通費','通信費','消耗品費','地代家賃','水道光熱費','接待交際費','保険料','税金・公課','その他経費'];
const EXP_COLORS=['#E24B4A','#EF9F27','#D85A30','#D4537E','#7F77DD','#378ADD','#A32D2D','#854F0B','#993556','#534AB7','#185FA5','#712B13'];
const STORE_KEY='uriage_data';

let ct='inc',today=new Date(),vy=today.getFullYear(),vm=today.getMonth();
let sel=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
let data=[];

// localStorage 読み書き
function loadData(){
  try{data=JSON.parse(localStorage.getItem(STORE_KEY)||'[]');}catch(e){data=[];}
}
function saveData(){
  localStorage.setItem(STORE_KEY,JSON.stringify(data));
}

function fy(n){return '¥'+Math.abs(Math.round(n)).toLocaleString('ja-JP')}
function fk(y,m,d){return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0')}

function getMonthData(){
  let p=vy+'-'+String(vm+1).padStart(2,'0')+'-';
  return data.filter(e=>e.date.startsWith(p));
}
function getYearData(){
  return data.filter(e=>e.date.startsWith(vy+'-'));
}

function updateDateHint(){
  if(!sel){document.getElementById('date-hint').textContent='↓ カレンダーで日付を選んでください';return;}
  let p=sel.split('-');
  document.getElementById('date-hint').innerHTML='選択中: <span>'+p[0]+'年'+parseInt(p[1])+'月'+parseInt(p[2])+'日</span>';
}

function addE(){
  if(!sel){alert('カレンダーの日付を選んでください');return}
  let a=parseInt(document.getElementById('ai').value);
  if(!a||a<=0){alert('金額を入力してください');return}
  let c=ct==='inc'?'売上':document.getElementById('cs').value;
  let note=document.getElementById('note').value.trim()||null;
  let entry={id:Date.now()+'_'+Math.random().toString(36).slice(2),date:sel,type:ct,category:c,amount:a,note};
  data.push(entry);
  saveData();
  let nv=document.getElementById('note').value.trim();
  if(nv){let h=JSON.parse(localStorage.getItem('nh_um')||'[]');if(!h.includes(nv)){h.unshift(nv);if(h.length>50)h.pop();localStorage.setItem('nh_um',JSON.stringify(h));updateNoteHistory();}}

// CSV
function exportCSV(){
  let rows=[['日付','種別','カテゴリ','金額','備考（取引先）']];
  let sorted=[...data].sort((a,b)=>a.date<b.date?-1:1);
  sorted.forEach(e=>{rows.push([e.date,e.type==='inc'?'売上':'経費',e.category,e.amount,e.note||'']);});
  let csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  let blob=new Blob([new Uint8Array([0xEF,0xBB,0xBF]),...[new TextEncoder().encode(csv)]],{type:'text/csv;charset=utf-8'});
  let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='売上経費管理_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}
function importCSV(event){
  let file=event.target.files[0];if(!file)return;
  let reader=new FileReader();
  reader.onload=function(e){
    let text=e.target.result;if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
    let lines=text.split('\n').filter(l=>l.trim());if(lines.length<2){alert('データがありません');return;}
    lines.shift();let imported=0;
    lines.forEach(line=>{
      let cols=line.match(/(".*?"|[^,]+)(?=,|$)/g)||[];
      cols=cols.map(c=>c.replace(/^"|"$/g,'').replace(/""/g,'"').trim());
      let date=cols[0],type=cols[1]==='売上'?'inc':'exp',category=cols[2]||(type==='inc'?'売上':'その他経費'),amount=parseInt(cols[3]),note=cols[4]||null;
      if(!date||!amount||isNaN(amount))return;
      data.push({id:Date.now()+'_'+Math.random().toString(36).slice(2),date,type,category,amount,note:note||null});imported++;
    });
    saveData();render();alert(imported+'件インポートしました');
  };
  reader.readAsText(file,'UTF-8');event.target.value='';
}

// 円グラフ
function drawPie(){
  let md=getMonthData();
  let filtered=md.filter(e=>e.type==='exp');let totals={};
  filtered.forEach(e=>{totals[e.category]=(totals[e.category]||0)+e.amount});
  let ents=Object.entries(totals).sort((a,b)=>b[1]-a[1]);let total=ents.reduce((s,e)=>s+e[1],0);
  let cx=55,cy=55,r=48,ri=22;
  let canvas=document.getElementById('pie-exp');canvas.style.cursor='pointer';
  canvas.onclick=function(ev){
    let rect=canvas.getBoundingClientRect();let x=ev.clientX-rect.left-55,y=ev.clientY-rect.top-55;
    let angle=Math.atan2(y,x)+Math.PI/2;let adj=angle<0?angle+Math.PI*2:angle;
    let s2=-Math.PI/2,tot2=ents.reduce((s,e)=>s+e[1],0);
    for(let i=0;i<ents.length;i++){let sl=(ents[i][1]/tot2)*Math.PI*2;if(adj>=s2&&adj<s2+sl){showCatDetail(ents[i][0],'exp');break;}s2+=sl;}
  };
  let ctx=canvas.getContext('2d');ctx.clearRect(0,0,110,110);let leg=document.getElementById('legend-exp');
  if(!ents.length){ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle='#e8e8e8';ctx.fill();ctx.beginPath();ctx.arc(cx,cy,ri,0,Math.PI*2);ctx.fillStyle='#f7f7f7';ctx.fill();leg.innerHTML='<div class="no-data">データなし</div>';return;}
  let start=-Math.PI/2;
  ents.forEach((e,i)=>{
    let slice=(e[1]/total)*Math.PI*2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,start,start+slice);ctx.closePath();ctx.fillStyle=EXP_COLORS[i%EXP_COLORS.length];ctx.fill();
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+r*Math.cos(start),cy+r*Math.sin(start));ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();start+=slice;
  });
  ctx.beginPath();ctx.arc(cx,cy,ri,0,Math.PI*2);ctx.fillStyle='#f7f7f7';ctx.fill();
  ctx.fillStyle='#555';ctx.textAlign='center';ctx.textBaseline='middle';ctx.font='bold 9px -apple-system,sans-serif';ctx.fillText('合計',cx,cy-6);ctx.font='bold 10px -apple-system,sans-serif';ctx.fillStyle='#222';ctx.fillText(fy(total),cx,cy+6);
  leg.innerHTML=ents.map((e,i)=>`<div class="leg-item" onclick="showCatDetail('${e[0]}','exp')" style="cursor:pointer"><div class="leg-dot" style="background:${EXP_COLORS[i%EXP_COLORS.length]}"></div><span class="leg-label">${e[0]}</span><span class="leg-pct">${Math.round(e[1]/total*100)}%</span></div><div class="leg-amt" onclick="showCatDetail('${e[0]}','exp')" style="cursor:pointer">${fy(e[1])}</div>`).join('');
}

// 月別推移グラフ
function renderTrendChart(){
  let canvas=document.getElementById('trend-chart');if(!canvas)return;
  let ctx=canvas.getContext('2d');
  let months=Array.from({length:12},(_,i)=>i+1);
  let yd=getYearData();
  let incData=months.map(m=>{let p=vy+'-'+String(m).padStart(2,'0')+'-';return yd.filter(e=>e.date.startsWith(p)&&e.type==='inc').reduce((s,e)=>s+e.amount,0);});
  let expData=months.map(m=>{let p=vy+'-'+String(m).padStart(2,'0')+'-';return yd.filter(e=>e.date.startsWith(p)&&e.type==='exp').reduce((s,e)=>s+e.amount,0);});
  let maxVal=Math.max(...incData,...expData,1);
  let W=canvas.offsetWidth||320;canvas.width=W*(window.devicePixelRatio||1);canvas.height=160*(window.devicePixelRatio||1);
  ctx.scale(window.devicePixelRatio||1,window.devicePixelRatio||1);
  let w=W,h=160,pad={t:10,r:10,b:30,l:50};let cw=w-pad.l-pad.r,ch=h-pad.t-pad.b;
  ctx.clearRect(0,0,w,h);
  ctx.strokeStyle='#eee';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){let y=pad.t+ch*(1-i/4);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+cw,y);ctx.stroke();ctx.fillStyle='#aaa';ctx.font='10px sans-serif';ctx.textAlign='right';ctx.fillText(fy(Math.round(maxVal*i/4)),pad.l-4,y+4);}
  [[incData,'#1D9E75'],[expData,'#E24B4A']].forEach(([vals,color])=>{
    ctx.strokeStyle=color;ctx.lineWidth=2;ctx.beginPath();
    vals.forEach((v,i)=>{let x=pad.l+cw*i/11,y=pad.t+ch*(1-v/maxVal);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});ctx.stroke();
    vals.forEach((v,i)=>{if(v===0)return;let x=pad.l+cw*i/11,y=pad.t+ch*(1-v/maxVal);ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();});
  });
  ctx.fillStyle='#888';ctx.font='10px sans-serif';ctx.textAlign='center';
  months.forEach((m,i)=>{ctx.fillText(m+'月',pad.l+cw*i/11,h-8);});
  ctx.fillStyle='#1D9E75';ctx.fillRect(pad.l,2,12,8);ctx.fillStyle='#444';ctx.textAlign='left';ctx.fillText('売上',pad.l+14,10);
  ctx.fillStyle='#E24B4A';ctx.fillRect(pad.l+50,2,12,8);ctx.fillStyle='#444';ctx.fillText('経費',pad.l+64,10);
}

function renderAnnual(){
  document.getElementById('annual-year').textContent=vy+'年';

  let currentMonth=today.getFullYear()===vy?today.getMonth():(vy<today.getFullYear()?11:-1);
  let yd=getYearData();let rows='';let cumInc=0,cumExp=0;
  for(let m=0;m<12;m++){
    let prefix=vy+'-'+String(m+1).padStart(2,'0')+'-';
    let md=yd.filter(e=>e.date.startsWith(prefix));
    let isFuture=m>currentMonth&&vy===today.getFullYear();

    if(isFuture&&!md.length){rows+=`<tr class="future"><td>${m+1}月</td><td>-</td><td>-</td><td>-</td><td>-</td></tr>`;}
    else{
      let mInc=md.filter(e=>e.type==='inc').reduce((s,e)=>s+e.amount,0);
      let mExp=md.filter(e=>e.type==='exp').reduce((s,e)=>s+e.amount,0);
      cumInc+=mInc;cumExp+=mExp;let mBal=mInc-mExp;
      let mRate=mInc>0?Math.round(mExp/mInc*100):'-';
      let mRateClass=typeof mRate==='number'?(mRate>=100?'bal-neg':mRate>=90?'exp-val':mRate>=80?'warn-val':'inc-val'):'';
      rows+=`<tr class="${isCurrent?'current-month':''}"><td>${m+1}月</td><td class="inc-val">${mInc>0?fy(mInc):'-'}</td><td class="exp-val">${mExp>0?fy(mExp):'-'}</td><td class="${mRateClass}">${typeof mRate==='number'?mRate+'%':'-'}</td><td class="${mBal>=0?'bal-pos':'bal-neg'}">${mInc===0&&mExp===0?'-':(mBal>=0?'+':'-')+fy(Math.abs(mBal))}</td></tr>`;
    }
  }
  let cumBal=cumInc-cumExp;let cumRate=cumInc>0?Math.round(cumExp/cumInc*100):0;
  let cumRateClass=cumRate>=100?'bal-neg':cumRate>=90?'exp-val':cumRate>=80?'warn-val':'inc-val';
  rows+=`<tr class="total-row"><td>累計</td><td class="inc-val">${fy(cumInc)}</td><td class="exp-val">${fy(cumExp)}</td><td class="${cumRateClass}">${cumRate}%</td><td class="${cumBal>=0?'bal-pos':'bal-neg'}">${(cumBal>=0?'+':'-')+fy(Math.abs(cumBal))}</td></tr>`;
  tbody.innerHTML=rows;
}

function applySeasonBg(){
  const m=vm+1;
  let grad=m>=3&&m<=5?'linear-gradient(135deg,#1D9E75,#085041)':m>=6&&m<=8?'linear-gradient(135deg,#0b7a5e,#1D9E75)':m>=9&&m<=11?'linear-gradient(135deg,#085041,#1a8c64)':'linear-gradient(135deg,#0d3d2e,#1D9E75)';
  document.querySelector('.topbar').style.background=grad;
}

// メインレンダリング
function render(){
  let md=getMonthData();
  document.getElementById('mlbl').textContent=(vm+1)+'月';
  document.getElementById('ylbl').textContent=vy+'年';
  applySeasonBg();

  // 集計
  let inc=md.filter(e=>e.type==='inc').reduce((s,e)=>s+e.amount,0);
  let exp=md.filter(e=>e.type==='exp').reduce((s,e)=>s+e.amount,0);
  document.getElementById('si').textContent=fy(inc);
  document.getElementById('se').textContent=fy(exp);
  let bal=inc-exp;let sbe=document.getElementById('sb');
  sbe.textContent=(bal<0?'-':'')+fy(bal);sbe.className='sv '+(bal>=0?'b':'e');

  // カレンダー
  let g=document.getElementById('grid');g.innerHTML='';
  let first=new Date(vy,vm,1).getDay();let dim=new Date(vy,vm+1,0).getDate();let prev=new Date(vy,vm,0).getDate();
  let cells=[];
  for(let i=0;i<first;i++)cells.push({d:prev-first+1+i,cur:false});
  for(let d=1;d<=dim;d++)cells.push({d,cur:true});
  while(cells.length%7!==0)cells.push({d:cells.length-first-dim+1,cur:false});
  cells.forEach((c,i)=>{
    let dow=i%7,div=document.createElement('div');
    let cy2=vy,cm=vm,cd=c.d;
    if(!c.cur){if(i<7){cm--;if(cm<0){cm=11;cy2--;}}else{cm++;if(cm>11){cm=0;cy2++;}}}
    let key=fk(cy2,cm,cd);let isTod=cy2===today.getFullYear()&&cm===today.getMonth()&&cd===today.getDate();
    div.className='cell'+(c.cur?'':' other')+(isTod?' today':'')+(key===sel?' sel':'');
    let dn=document.createElement('div');let hname=getHolidayName(cy2,cm,cd);
    dn.className='cn'+(dow===0||hname?' sun':dow===6?' sat':'')+(isTod?' tod':'');
    dn.textContent=cd;div.appendChild(dn);
    if(hname){let hl=document.createElement('div');hl.style.cssText='font-size:7px;color:var(--r);line-height:1.1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 1px';hl.textContent=hname;div.appendChild(hl);}
    if(c.cur){
      let _k=key,_y=cy2,_m=cm,_d=cd;
      div.onclick=function(){clickDay(_k,_y,_m,_d)};
    }
    g.appendChild(div);
  });

  // 選択日の記録
  let list=document.getElementById('elist');
  if(!sel){list.innerHTML='<div class="em">日付を選んでください</div>';return;}
  let de=data.filter(e=>e.date===sel);
  if(!de.length){list.innerHTML='<div class="em">この日の記録はありません</div>';}
  else{list.innerHTML=de.map(e=>`<div class="er" onclick="openEditModal('${e.id}')" style="cursor:pointer">
    <div style="flex:1;overflow:hidden">
      <div class="ec">${e.type==='inc'?'売上':'経費：'+e.category}</div>
      <span style="font-size:11px;color:#aaa">${e.note||'－'}</span>
    </div>
    <span class="ea ${e.type==='inc'?'i':'e'}">${e.type==='inc'?'+':'-'}${fy(e.amount)}</span>
    <button class="db" onclick="event.stopPropagation();delE('${e.id}')">✕</button>
  </div>`).join('');}

  drawPie();renderAnnual();renderBudgetBars();renderTrendChart();
}

document.getElementById('prev').onclick=function(){vm--;if(vm<0){vm=11;vy--;}sel=null;updateDateHint();render()};
document.getElementById('next').onclick=function(){vm++;if(vm>11){vm=0;vy++;}sel=null;updateDateHint();render()};
document.getElementById('prev-year').onclick=function(){vy--;sel=null;updateDateHint();render()};
document.getElementById('next-year').onclick=function(){vy++;sel=null;updateDateHint();render()};

// スワイプ
(function(){
  let startX=0,startY=0;
  document.querySelector('.wrap').addEventListener('touchstart',function(e){startX=e.touches[0].clientX;startY=e.touches[0].clientY;},{passive:true});
  document.querySelector('.wrap').addEventListener('touchend',function(e){
    let dx=e.changedTouches[0].clientX-startX;let dy=e.changedTouches[0].clientY-startY;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>50){
      if(dx<0){vm++;if(vm>11){vm=0;vy++;}}else{vm--;if(vm<0){vm=11;vy--;}}
      sel=null;updateDateHint();render();
    }
  },{passive:true});
})();

// 初期化
loadData();updateNoteHistory();setType('inc');setType2('inc');render();updateDateHint();
</script>
</body>
